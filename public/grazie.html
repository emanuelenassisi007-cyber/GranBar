<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Messaggio inviato</title>
    <link rel="stylesheet" href="style.css" />
    <style>
      * {
        font-family: Verdana, Geneva, Tahoma, sans-serif;
      }
      .box {
        display: flex;
        flex-direction: column;
        width: 400px;
        max-width: 90%;
        padding: 25px;
        margin: 120px auto;
        align-items: center;
        justify-content: center;
        border: none;
        box-shadow: 0px 0px 8px 7px #eeeded;
        gap: 20px;
      }
      .message {
        font-size: 20px;
        color: rgb(46, 44, 44);
        font-weight: bold;
      }
      .message2 {
        font-size: 14px;
        color: dimgray;
        font-weight: normal;
        text-align: center;
      }
      .button {
        display: flex;
        justify-content: center;
        align-items: center;
        background-color: #007aff;
        font-size: 12px;
        color: white;
        border: none;
        padding: 8px;
        width: 220px;
        max-width: 100%;
        padding: 10px;
        border-radius: 5px;
        cursor: pointer;
      }
      @media (max-width: 768px) {
        .box {
          width: 100%;
          max-width: 340px;
          margin: 80px auto;
          padding: 20px;
        }

        .message {
          font-size: 18px;
          text-align: center;
        }

        .message2 {
          font-size: 15px;
        }

        .button {
          width: 100%;
        }

        .box img {
          width: 70px;
        }
      }
    </style>
  </head>
  <body>
    <div class="box">
      <img src="check.png" width="90px" />
      <span class="message">Messaggio inviato!</span>
      <span class="message2"
        >Il tuo messaggio è stato inviato correttamente. Puoi continuare la
        visita al sito.
      </span>
      <button class="button">Torna alla home</button>
    </div>
  </body>
  <script>
    const button = document
      .querySelector("button")
      .addEventListener("click", () => {
        window.location.href = "index.html";
      });
  </script>
</html>
